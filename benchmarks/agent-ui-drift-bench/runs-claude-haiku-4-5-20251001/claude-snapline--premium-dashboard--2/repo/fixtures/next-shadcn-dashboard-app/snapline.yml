version: 1

stack:
  framework: next
  ui: shadcn
  styling: tailwind

components:
  Button:
    import: "@/components/ui/button"
    preferOver:
      - "button"
  Input:
    import: "@/components/ui/input"
    preferOver:
      - "input"
  Dialog:
    import: "@/components/ui/dialog"
    preferOver:
      - "div[role=\"dialog\"]"
  Card:
    import: "@/components/ui/card"
    preferOver:
      - "div[data-card]"

tokens:
  colors:
    semanticOnly: true
    allowed:
      - bg-background
      - text-foreground
      - bg-primary
      - text-primary-foreground
      - bg-secondary
      - text-secondary-foreground
      - text-muted-foreground
      - border-border
      - bg-card
      - text-card-foreground
      - bg-destructive
      - text-destructive-foreground

rules:
  noRawHex: error
  noInlineStyle: error
  noArbitraryTailwind: error
  noRawPaletteColor: warn
  requireButtonComponent: error
  requireInputComponent: error
  requireDialogComponent: warn
  requireCardComponent: warn
  noDuplicateComponents: warn

fix:
  safeAutofix: false
  preferAgentRepair: true

benchmark:
  enabled: true
  scorer: ui-drift-score-v1
